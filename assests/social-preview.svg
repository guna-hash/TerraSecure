<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Shield Icon (Large) -->
  <path d="M200 150 L100 220 L100 400 Q100 500 200 580 Q300 500 300 400 L300 220 Z" 
        fill="#ffffff" opacity="0.15"/>
  <path d="M200 180 L140 230 L140 400 Q140 470 200 530 Q260 470 260 400 L260 230 Z" 
        fill="#ffffff" opacity="0.9"/>
  
  <!-- Title -->
  <text x="350" y="300" font-family="Arial, sans-serif" font-size="96" font-weight="bold" 
        fill="#ffffff">TerraSecure</text>
  
  <!-- Subtitle -->
  <text x="350" y="370" font-family="Arial, sans-serif" font-size="48" 
        fill="#00D4AA">AI-Powered Terraform Security Scanner</text>
  
  <!-- Features -->
  <text x="350" y="450" font-family="Arial, sans-serif" font-size="32" 
        fill="#ffffff" opacity="0.9">🤖 92% ML Accuracy  •  🧠 AI Explanations  •  ⚡ GitHub Integration</text>
  
  <!-- Stats -->
  <rect x="350" y="490" width="180" height="60" fill="#00D4AA" rx="8"/>
  <text x="440" y="532" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#001a3d" text-anchor="middle">10.7% FP Rate</text>
  
  <rect x="550" y="490" width="180" height="60" fill="#ffffff" rx="8"/>
  <text x="640" y="532" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#0066FF" text-anchor="middle">27 Tests Pass</text>
  
  <rect x="750" y="490" width="180" height="60" fill="#FF6B6B" rx="8"/>
  <text x="840" y="532" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">&lt;100ms Scan</text>
</svg>