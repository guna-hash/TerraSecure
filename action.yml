name: 'TerraSecure Security Scanner'
description: 'AI-Powered Terraform Security Scanner with ML (92% accuracy)'
author: 'JashwanthMU'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to Terraform files'
    required: false
    default: '.'
  
  format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'sarif'
  
  output:
    description: 'Output file path'
    required: false
    default: 'terrasecure-results.sarif'
  
  fail-on:
    description: 'Fail on severity (critical, high, medium, low)'
    required: false
    default: 'high'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        pip install -r requirements.txt
    
    - name: Build ML model if needed
      shell: bash
      run: |
        cd ${{ github.action_path }}
        if [ ! -f "models/terrasecure_production_v1.0.pkl" ]; then
          python scripts/build_production_model.py
        fi
    
    - name: Run TerraSecure
      shell: bash
      run: |
        cd ${{ github.action_path }}
        python src/cli.py ${{ inputs.path }} \
          --format ${{ inputs.format }} \
          --output ${{ github.workspace }}/${{ inputs.output }} \
          --fail-on ${{ inputs.fail-on }}