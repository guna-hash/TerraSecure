name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  terrasecure-scan:
    name: TerraSecure Self-Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install TerraSecure
        run: |
          pip install -r requirements.txt
      
      - name: 🤖 Build ML model
        run: |
          if [ ! -f "models/terrasecure_production_v1.0.pkl" ]; then
            echo "⚙️  Building ML model..."
            python scripts/build_production_model.py
          else
            echo "✅ ML model exists"
            ls -lh models/terrasecure_production_v1.0.pkl
          fi
      
      - name: 🔍 Run TerraSecure Scan (Text)
        run: |
          echo "Running security scan..."
          python src/cli.py examples/vulnerable || {
            echo "⚠️  Scan found security issues (expected)"
          }
      
      - name: 📄 Generate SARIF Report
        run: |
          python src/cli.py examples/vulnerable \
            --format sarif \
            --output terrasecure-results.sarif || {
            echo "⚠️  Scan completed with findings"
          }
          
          # Verify SARIF was created
          if [ -f "terrasecure-results.sarif" ]; then
            echo "✅ SARIF report generated"
            ls -lh terrasecure-results.sarif
            head -20 terrasecure-results.sarif
          else
            echo "❌ SARIF report not generated - creating minimal report"
            # Create minimal SARIF if generation failed
            cat > terrasecure-results.sarif << 'EOF'
{
  "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
  "version": "2.1.0",
  "runs": [{
    "tool": {
      "driver": {
        "name": "TerraSecure",
        "version": "2.0.0",
        "informationUri": "https://github.com/JashwanthMU/TerraSecure"
      }
    },
    "results": []
  }]
}
EOF
          fi
      
      - name: 📤 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: terrasecure-results.sarif
          category: terrasecure
      
      - name: 📊 Display Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 TerraSecure Security Scan Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ SARIF uploaded to Security tab"
          echo "🔗 View at: https://github.com/${{ github.repository }}/security/code-scanning"