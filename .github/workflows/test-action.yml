name: Test TerraSecure Action

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  test-action:
    name: Test TerraSecure Action
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test Action - Basic
        uses: ./
        with:
          path: 'examples/vulnerable'
          output: 'test-basic.sarif'
      
      - name: Test Action - JSON Format
        uses: ./
        with:
          path: 'examples/vulnerable'
          format: 'json'
          output: 'test.json'
          upload-sarif: 'false'
      
      - name: Show Results
        run: |
          echo " SARIF Results:"
          cat test-basic.sarif | jq '.runs[0].results | length'
          
          echo " JSON Results:"
          cat test.json | jq '.issues | length'